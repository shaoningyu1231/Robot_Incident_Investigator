<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Robot Incident Investigator</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a3441;
    --ink:#e6edf3; --dim:#8b98a8; --accent:#4493f8; --ok:#2ea043; --warn:#d29922; --bad:#f85149;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  header h1{font-size:15px;margin:0;font-weight:600;letter-spacing:.2px}
  header .sub{color:var(--dim);font-size:12px}
  .badge{margin-left:auto;font:12px var(--mono);padding:4px 10px;border-radius:999px;border:1px solid var(--line)}
  .badge.online{color:#7ee787;border-color:#2ea04366;background:#1a2b1f}
  .badge.offline{color:#f0c674;border-color:#d2992266;background:#2b2415}
  .badge.neutral{color:var(--dim)}
  main{display:grid;grid-template-columns:1.4fr 1fr;gap:14px;padding:14px;max-width:1300px;margin:0 auto}
  @media(max-width:900px){main{grid-template-columns:1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}
  .card h2{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin:0 0 10px}
  .lidarwrap{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}
  .lidarwrap img{width:300px;max-width:100%;background:#fff;border-radius:8px;border:1px solid var(--line)}
  .readout{font:12.5px var(--mono);color:var(--dim);min-width:180px}
  .readout b{color:var(--ink)}
  .chartwrap{position:relative;margin:10px 0;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
  .chartwrap img{display:block;width:100%}
  .cursor{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);box-shadow:0 0 6px var(--accent);pointer-events:none}
  .controls{display:flex;align-items:center;gap:12px;margin-top:8px}
  .controls input[type=range]{flex:1}
  button{font:13px system-ui;color:var(--ink);background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px 12px;cursor:pointer}
  button:hover{border-color:var(--accent)}
  button.primary{background:var(--accent);border-color:var(--accent);color:#04101f;font-weight:600}
  .tnow{font:13px var(--mono);color:var(--accent);min-width:64px;text-align:right}
  textarea{width:100%;background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:10px;font:13px system-ui;resize:vertical;min-height:54px}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
  .chip{font:11.5px var(--mono);padding:3px 8px;border-radius:6px;border:1px solid var(--line);color:var(--dim);cursor:pointer}
  .chip:hover{border-color:var(--accent);color:var(--ink)}
  .chip.tool{color:#7ee787;border-color:#2ea04344;cursor:default}
  .answer{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px;white-space:pre-wrap;font-size:13.5px;min-height:40px}
  .answer code{font:12.5px var(--mono);background:#0b0f14;padding:1px 5px;border-radius:4px}
  .ev{display:flex;gap:8px;align-items:center;padding:6px 8px;border:1px solid var(--line);border-radius:7px;margin-bottom:6px;cursor:pointer}
  .ev:hover{border-color:var(--accent)}
  .ev .t{font:12px var(--mono);color:var(--accent);min-width:48px}
  .ev .mod{font:10.5px var(--mono);color:var(--dim);text-transform:uppercase}
  .meta{font-size:11.5px;color:var(--dim);margin-top:6px}
  .seek{display:flex;gap:8px;margin-top:8px}
  .seek button{flex:1;font-size:12px}
  .note{font-size:11px;color:var(--dim);margin-top:8px}
  .imgcount{font:11px var(--mono);color:var(--dim)}
  .tlink{color:var(--accent);text-decoration:underline dotted;cursor:pointer}
  .ev.hot{border-color:var(--accent);background:#10243f;box-shadow:0 0 0 1px var(--accent) inset}
  .markers{position:relative;height:18px;margin:2px 0 -2px}
  .marker{position:absolute;top:0;transform:translateX(-50%);width:10px;height:10px;border-radius:50%;
          background:var(--panel2);border:1px solid var(--accent);cursor:pointer}
  .marker.stop{background:var(--bad);border-color:var(--bad)}
  .marker:hover{transform:translateX(-50%) scale(1.3)}
  .evline{position:absolute;top:0;bottom:0;width:1px;background:#4493f855;pointer-events:none}
  .evline.stop{background:#f8514955}
  button:disabled{opacity:.45;cursor:not-allowed;border-color:var(--line)}
  button.cancel{border-color:var(--bad);color:#ff9b94}
  .retry{color:var(--accent);text-decoration:underline;cursor:pointer}
  .spin{display:inline-block;animation:bl 1s steps(3,end) infinite;width:1.2em}
  @keyframes bl{0%{content:''}}
</style>
</head>
<body>
<header>
  <h1>Robot Incident Investigator</h1>
  <span class="sub" id="scenario"></span>
  <span class="badge neutral" id="modeBadge">Gemini: …</span>
</header>

<main>
  <section>
    <div class="card">
      <h2>Synchronized timeline</h2>
      <div class="lidarwrap">
        <img id="lidar" alt="LiDAR scan">
        <div class="readout" id="readout"></div>
      </div>
      <div class="markers" id="markers"></div>
      <div class="controls">
        <button id="play">▶ Play</button>
        <button id="jump">⤓ Jump to stop</button>
        <input type="range" id="scrub" min="0" max="25" step="0.1" value="0">
        <span class="tnow" id="tnow">0.0s</span>
      </div>
      <div id="charts"></div>
    </div>
  </section>

  <section>
    <div class="card">
      <h2>Interrogate the incident</h2>
      <textarea id="q" placeholder="e.g. Why did the robot stop? / What must be satisfied before it can resume?"></textarea>
      <div class="seek">
        <button data-q="Why did the robot stop? Inspect the incident and cite the evidence timestamps.">为什么停?</button>
        <button data-q="Before resuming from that stop, what conditions must be satisfied right now?">恢复条件?</button>
        <button class="primary" id="ask">Ask</button>
        <button class="cancel" id="cancel" style="display:none">■ Cancel</button>
        <button id="reset" title="清空多轮上下文">↺ New</button>
      </div>
      <div class="imgcount" id="turns"></div>
      <div class="chips" id="tools"></div>
      <div class="imgcount" id="imgcount"></div>
      <div class="answer" id="answer">Ask a question to investigate. Online uses Gemini multimodal; if unavailable it falls back to a deterministic offline answer (badge shows which).</div>
    </div>

    <div class="card" style="margin-top:14px">
      <h2>Evidence — click to seek</h2>
      <div id="evidence"></div>
      <div class="note" id="gt"></div>
    </div>
  </section>
</main>

<script>
// 图表绘制时的画布几何(须与 tools/export_incident_assets.py 的 _plot 一致)
const PLOT = {W:560, ML:60, MR:16};
const DUR = 25;
let TL=null, ANN=null, META=null, lidar=[], metrics=[], playing=false, timer=null, STOP_T=10.6, HIST=[];

const $ = s => document.querySelector(s);
const esc = s => s.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
function fmtAnswer(t){
  let h = esc(t).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
  // 把 "10.6s" / "t=10.6" 这类时间戳变成可点击链接(只匹配秒,不碰 1.2m / 0.74m)
  h = h.replace(/\b(?:t=)?(\d{1,2}(?:\.\d+)?)\s*s\b/g,
                (m,n)=>`<span class="tlink" data-t="${n}">${m}</span>`);
  return h;
}
function cursorPct(t){ // t -> 占图片宽度的百分比
  const x0=PLOT.ML, x1=PLOT.W-PLOT.MR;
  return (x0 + (t/DUR)*(x1-x0)) / PLOT.W * 100;
}
function nearest(arr, t){
  let best=arr[0], bd=1e9;
  for(const m of arr){ const d=Math.abs(m.t-t); if(d<bd){bd=d;best=m;} }
  return best;
}

async function boot(){
  const h = await (await fetch('/health')).json();
  setBadge(h.gemini ? 'avail' : 'nokey');
  const inc = await (await fetch('/incident')).json();
  META=inc.metadata; TL=inc.timeline; ANN=inc.annotations;
  lidar=[...TL.tracks.lidar].sort((a,b)=>a.t-b.t);
  metrics=[...TL.tracks.metrics].sort((a,b)=>a.t-b.t);
  $('#scenario').textContent = META.scenario_label || '';
  $('#gt').textContent = 'Ground truth: ' + META.ground_truth.root_cause;
  // 事故停车时刻(用于 jump 按钮 + 红色 marker)
  const stopEv = ANN.evidence.find(e=>e.id==='ev_stop_event') ||
                 ANN.evidence.find(e=>e.modality==='log');
  if(stopEv) STOP_T = stopEv.t;
  $('#jump').textContent = `⤓ Jump to stop (${STOP_T.toFixed(1)}s)`;
  // charts:每张图叠加证据竖线 + 游标
  const cw = $('#charts');
  for(const c of TL.tracks.charts){
    const w=document.createElement('div'); w.className='chartwrap';
    let lines='';
    for(const e of ANN.evidence)
      lines+=`<div class="evline${e.id===(stopEv&&stopEv.id)?' stop':''}" style="left:${cursorPct(e.t)}%"></div>`;
    w.innerHTML = `<img src="/media/${c.ref}" alt="${c.kind}">${lines}<div class="cursor" data-c></div>`;
    cw.appendChild(w);
  }
  // evidence 列表
  const ev=$('#evidence');
  for(const e of ANN.evidence){
    const d=document.createElement('div'); d.className='ev'; d.dataset.t=e.t; d.title=e.expected_observation||'';
    d.innerHTML=`<span class="t">${e.t.toFixed(1)}s</span><span>${e.id}</span><span class="mod">${e.modality}</span>`;
    d.onclick=()=>seek(e.t);
    ev.appendChild(d);
  }
  // 时间轴上方证据 markers(可点击)
  const mk=$('#markers');
  for(const e of ANN.evidence){
    const dot=document.createElement('div');
    dot.className='marker'+(stopEv&&e.id===stopEv.id?' stop':'');
    dot.style.left=(e.t/(META.duration_s||DUR))*100+'%';
    dot.title=`${e.t.toFixed(1)}s · ${e.id}`;
    dot.onclick=()=>seek(e.t);
    mk.appendChild(dot);
  }
  $('#scrub').max=META.duration_s||DUR;
  render(0);
}

function setBadge(kind){
  const b=$('#modeBadge');
  if(kind==='online'){b.className='badge online';b.textContent='● Online Gemini';}
  else if(kind==='offline'){b.className='badge offline';b.textContent='● Offline deterministic fallback';}
  else if(kind==='avail'){b.className='badge neutral';b.textContent='Gemini: available';}
  else {b.className='badge offline';b.textContent='Gemini: no key → offline';}
}

function render(t){
  $('#tnow').textContent=t.toFixed(1)+'s';
  $('#scrub').value=t;
  const lf=nearest(lidar,t);
  if(lf) $('#lidar').src='/media/'+lf.ref;
  const m=nearest(metrics,t);
  if(m){
    $('#readout').innerHTML =
      `t=<b>${m.t.toFixed(1)}s</b><br>front_distance=<b>${m.front_distance_m.toFixed(2)} m</b>`+
      ` (thr ${META.demo_thresholds.front_safety_m})<br>`+
      `planner=<b>${m.planner_speed_mps.toFixed(2)}</b>  applied=<b>${m.applied_speed_mps.toFixed(2)}</b>  `+
      `actual=<b>${m.actual_speed_mps.toFixed(2)}</b> m/s<br>safety_state=<b>${m.safety_state}</b>`;
  }
  document.querySelectorAll('[data-c]').forEach(c=>c.style.left=cursorPct(t)+'%');
  // 高亮当前时刻附近的证据卡
  document.querySelectorAll('.ev').forEach(d=>
    d.classList.toggle('hot', Math.abs(parseFloat(d.dataset.t)-t)<0.15));
}
function seek(t){ stop(); render(Math.max(0,Math.min(DUR,t))); }

function play(){
  if(playing){stop();return;}
  playing=true; $('#play').textContent='⏸ Pause';
  timer=setInterval(()=>{
    let t=parseFloat($('#scrub').value)+0.1;
    if(t>DUR){t=DUR; stop();}
    render(t);
  },80);
}
function stop(){ playing=false; $('#play').textContent='▶ Play'; if(timer)clearInterval(timer); }

function toolChip(tr){
  const c=document.createElement('span'); c.className='chip tool';
  c.textContent=tr.tool+(tr.args&&tr.args.start!=null?` [${tr.args.start},${tr.args.end}]`:
                tr.args&&tr.args.evaluation_window?` [${tr.args.evaluation_window.join(',')}]`:'');
  if(tr.args&&tr.args.start!=null){c.style.cursor='pointer';c.classList.remove('tool');c.onclick=()=>seek(tr.args.start);}
  return c;
}
function onProgress(j){
  if(j.event==='start'){ setBadge('online'); $('#answer').innerHTML='<i>● Gemini online — investigating…</i>'; }
  else if(j.event==='thinking'){ $('#answer').innerHTML=`<i>Thinking… (step ${j.step+1})</i>`; }
  else if(j.event==='tool_call'){
    $('#tools').appendChild(toolChip(j));
    $('#answer').innerHTML=`<i>→ calling <b>${j.tool}</b>${j.images?` · +${j.images} image${j.images>1?'s':''}`:''}</i>`;
  }
  else if(j.event==='fallback'){ setBadge('offline'); $('#answer').innerHTML=`<i>Gemini unavailable (${j.reason}) — offline fallback…</i>`; }
}
function onResult(j){
  setBadge(j.mode==='online'?'online':'offline');
  if(j.history){ HIST=j.history; $('#turns').textContent=`conversation turns: ${HIST.length/2} · follow-ups keep context`; }
  $('#answer').innerHTML=fmtAnswer(j.answer||'(no answer)');
  $('#tools').innerHTML='';                       // 用最终 trace 重建,保证准确(含离线路径)
  (j.trace||[]).forEach(tr=>$('#tools').appendChild(toolChip(tr)));
  if(j.mode==='offline'&&j.fallback_reason){
    const c=document.createElement('span');c.className='chip';c.textContent='fallback: '+j.fallback_reason;$('#tools').appendChild(c);
  }
  $('#imgcount').textContent=`images submitted to Gemini: ${j.images_submitted||0} · model: ${j.model||'—'}`;
}
function handleSSE(block){
  let ev='message', data='';
  for(const line of block.split('\n')){
    if(line.startsWith('event:')) ev=line.slice(6).trim();
    else if(line.startsWith('data:')) data+=line.slice(5).trim();
  }
  if(!data) return;
  let j; try{ j=JSON.parse(data); }catch(e){ return; }
  if(ev==='result') onResult(j); else onProgress(j);
}
let BUSY=false, LASTQ=null, ABORT=null, TIMER=null;
const TIMEOUT_MS=45000;
function setBusy(b){
  BUSY=b;
  $('#ask').disabled=b; $('#reset').disabled=b;
  document.querySelectorAll('[data-q]').forEach(x=>x.disabled=b);
  $('#cancel').style.display=b?'':'none';
}
function retryLink(){
  return ` <span class="retry" id="retry">retry</span>`;
}
async function ask(q){
  if(!q || !q.trim()) return;
  if(BUSY) return;                 // 防重复点击 / 并发请求
  LASTQ=q; setBusy(true);
  $('#tools').innerHTML=''; $('#imgcount').textContent='';
  $('#answer').innerHTML='<i>Starting…</i>';
  ABORT=new AbortController();
  let sawResult=false;
  clearTimeout(TIMER); TIMER=setTimeout(()=>{ if(ABORT) ABORT.abort('timeout'); }, TIMEOUT_MS);
  try{
    const resp=await fetch('/investigate/stream',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({question:q, history:HIST}), signal:ABORT.signal});
    if(!resp.ok){
      const j=await resp.json().catch(()=>({}));
      $('#answer').innerHTML=`Request rejected (${resp.status}): ${esc(j.error||'')}.`+retryLink();
      return;
    }
    const reader=resp.body.getReader(), dec=new TextDecoder(); let buf='';
    while(true){
      const {value,done}=await reader.read(); if(done)break;
      buf+=dec.decode(value,{stream:true});
      let i; while((i=buf.indexOf('\n\n'))>=0){ const blk=buf.slice(0,i); buf=buf.slice(i+2);
        if(blk.includes('event: result')) sawResult=true; handleSSE(blk); }
    }
    if(buf.trim()){ if(buf.includes('event: result')) sawResult=true; handleSSE(buf); }
    if(!sawResult){ $('#answer').innerHTML='Connection closed before a result arrived.'+retryLink(); }
  }catch(e){
    if(ABORT && ABORT.signal.aborted)
      $('#answer').innerHTML=(ABORT.signal.reason==='timeout'?'Timed out (45s).':'Cancelled.')+retryLink();
    else
      $('#answer').innerHTML='Connection lost.'+retryLink();
  }finally{
    clearTimeout(TIMER); ABORT=null; setBusy(false);
    const rl=$('#retry'); if(rl) rl.onclick=()=>ask(LASTQ);
  }
}

$('#play').onclick=play;
$('#jump').onclick=()=>seek(STOP_T);
$('#scrub').oninput=e=>{stop();render(parseFloat(e.target.value));};
$('#ask').onclick=()=>ask($('#q').value);
$('#cancel').onclick=()=>{ if(ABORT) ABORT.abort('cancel'); };
$('#reset').onclick=()=>{ if(BUSY) return; HIST=[];$('#turns').textContent='';$('#tools').innerHTML='';$('#imgcount').textContent='';
  $('#answer').innerHTML='New investigation — context cleared.';$('#q').value='';};
document.querySelectorAll('[data-q]').forEach(b=>b.onclick=()=>{$('#q').value=b.dataset.q;ask(b.dataset.q);});
// 答案里的时间戳链接 → 跳时间轴(事件委托,适配动态内容)
$('#answer').addEventListener('click',e=>{
  const l=e.target.closest('.tlink'); if(l) seek(parseFloat(l.dataset.t));
});
boot();
</script>
</body>
</html>
